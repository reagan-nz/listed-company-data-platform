      - 第一季度报告
      - 第三季度报告
    notes: >-
      B-FM-01 自 harvest 证据晋升：博源化工 000683，九届二十九次董事会决议公告
      （announcement_id=1224014247，披露日 2025-06-27）。来源
      outputs/validation/cninfo_b_class_erad_scale_200/reports/b_class_erad_scale_200_report.csv
      行 BD2E078（quality=pass）。类别抽样全市场窗；不写 verified；不下载 PDF。

