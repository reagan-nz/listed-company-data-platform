# Company configuration for the data source validation framework.
#
# IMPORTANT:
#   - This framework is company-agnostic. No company-specific logic lives in code.
#   - Fill in the entries below with the companies you want to validate.
#   - Leave values empty or use placeholders; do NOT commit real example data here.
#
# Fields:
#   company_name           Full legal/registered name (required)
#   short_name             Common short name / ticker name (required)
#   stock_code             Exchange code, e.g. "000000" / "600000" / "800000" (required)
#   exchange               One of: SSE | SZSE | BSE  (required)
#   official_website       Company homepage URL (optional)
#   investor_relations_url Investor relations page URL (optional)
#   keywords               Extra search terms used to build source queries (optional)

companies:
  - company_name: ""
    short_name: ""
    stock_code: ""
    exchange: ""
    official_website: ""
    investor_relations_url: ""
    keywords: []

