  - source_id: cninfo_meeting_notice_pdf
    source_name: 巨潮说明会/会议通知 PDF
    endpoint_id: EP007
    phase1_status: deferred_phase2
    deferred_phase2: true
    source_layer: document_corpus
    source_category: meeting_notice_pdf
    source_site: cninfo.com.cn
    discovery_method: cninfo_announcement_search
    query_endpoint: null
    page_url: null
    params_template: {}
    document_type_candidates:
      - meeting_notice
      - investor_relations_activity
    title_positive_patterns:
      meeting_notice:
        - 业绩说明会
        - 投资者说明会
        - 说明会
        - 交流会
        - 股东大会通知
        - 董事会会议通知
    title_exclusion_patterns: []
    period_required: false
    company_required: true
    org_id_required: true
    url_field: adjunctUrl
    title_field: announcementTitle
    announcement_date_field: announcementTime
    document_id_field: announcementId
    retrieval_status_values:
      - found
      - not_found
      - empty_response
    parse_status_values:
      - not_started
      - skipped
    chunk_status_values:
      - not_started
      - skipped
    embedding_status_values:
      - not_started
      - skipped
    status:
