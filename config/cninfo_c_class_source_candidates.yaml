# CNINFO C 类 Company Profile Source Candidates
# Era C Phase 4 — P1 YAML backfill v1 (basic + security testing; industry derived).
# 不入库；不写 verified。
#
# 权威设计: plans/cninfo_c_class_f10_source_discovery_design.md
# 数据模型: plans/cninfo_c_class_profile_data_model_draft.md
# 边界: plans/cninfo_c_vs_b_vs_d_boundary.md
# 勿与 cninfo_b_class_source_registry_draft.yaml 或 cninfo_d_class_source_registry_draft.yaml 混用。

version: "draft-0.1"
status: design_only
verified: false

defaults:
  source_site: cninfo.com.cn
  source_layer: company_profile
  discovery_method: f10_page_probe
  recommended_status: candidate
  verified: false
  timeout_seconds: 10
  sleep_seconds: 0.6
  required_keys:
    - company_code
    - org_id

sources:
  - source_id: cninfo_company_basic_profile
    source_layer: company_profile
    source_category: basic_profile
    profile_section: basic
    recommended_status: testing
    verified: false
    endpoint:
      url: "https://www.cninfo.com.cn/data20/companyOverview/getCompanyIntroduction"
      method: "GET"
      params_template:
        scode: "{company_code}"
      records_path: "data.records[0]"
      sub_records:
        basic_information_path: "data.records[0].basicInformation[0]"
        listing_information_path: "data.records[0].listingInformation[0]"
      headers_required_candidate:
        - Referer
    page_url: null
    expected_fields:
      - company_name
      - legal_name
      - industry
      - listed_board
      - exchange
      - listing_date
      - registered_capital
      - legal_representative
      - registered_address
      - office_address
    sample_observation:
      companies_tested:
        - company_code: "600000"
          company_name: "浦发银行"
          result: "endpoint_found"
        - company_code: "300001"
          company_name: "特锐德"
          result: "endpoint_found"
        - company_code: "688001"
          company_name: "华兴源创"
          result: "endpoint_found"
      sample_result_summary: >-
        3/3 endpoint_found in live validation v1; earlier manual DevTools probe
        observed 600000 empty_but_valid_response.
    known_caveats:
      - "Earlier manual DevTools probe observed 600000 returning HTTP 200 with empty basicInformation/listingInformation arrays."
      - "Later live validation v1 returned non-empty basicInformation/listingInformation for 600000."
      - "This suggests possible cache/context/timing differences; keep small-sample testing status only."
      - "Field semantics are candidate-level and require validation script confirmation."
      - "Some fields may remain raw-only until schema mapping is finalized."
    notes: >-
      P1 DevTools probe backfill v1. getCompanyIntroduction endpoint.
      See plans/cninfo_c_class_basic_profile_field_mapping_draft.md.
      verified=false; not full-market stable.

  - source_id: cninfo_company_industry_profile
    source_layer: company_profile
    source_category: industry_profile
    profile_section: industry
    recommended_status: candidate
    verified: false
    endpoint: null
    page_url: null
    derived_from_candidate:
      source_id: "cninfo_company_basic_profile"
      path: "data.records[0].basicInformation[0]"
      fields:
        - raw_field: "F032V"
          candidate_meaning: "industry_name"
        - raw_field: "MARKET"
          candidate_meaning: "market_or_board"
        - raw_field: "F044V"
          candidate_meaning: "index_or_plate_labels"
    expected_fields:
      - industry
      - industry_code_candidate
      - listed_board
    known_caveats:
      - "No separate industry_profile endpoint found in P1 probe."
      - "Industry profile may be derived from basic_profile fields."
      - "Keep as candidate until live validation confirms derived mapping."
    notes: >-
      Industry / sector classification. No independent endpoint in P1 probe;
      derived_from cninfo_company_basic_profile. Endpoint not probed separately.

  - source_id: cninfo_company_business_scope
    source_layer: company_profile
    source_category: business_scope
    profile_section: business
    recommended_status: candidate
    verified: false
    endpoint: null
    page_url: null
    expected_fields:
      - main_business_summary
      - business_scope
      - company_profile_text
    notes: >-
      Business scope and company overview text. May overlap basic_profile;
      cross-source consistency check required. Endpoint not yet probed.

  - source_id: cninfo_executive_profile
    source_layer: company_profile
    source_category: executive_profile
    profile_section: executive
    recommended_status: candidate
    verified: false
    endpoint: null
    page_url: null
    expected_fields:
      - person_name
      - position
      - term_start_candidate
      - term_end_candidate
    notes: >-
      Board / management roster snapshot. Not management_change events (D-class).
      Endpoint not yet probed.

  - source_id: cninfo_share_capital_profile
    source_layer: company_profile
    source_category: share_capital_profile
    profile_section: share_capital
    recommended_status: candidate
    verified: false
    endpoint: null
    page_url: null
    expected_fields:
      - report_date
      - total_share_capital
      - float_share_capital
      - restricted_share_capital
      - share_unit
    notes: >-
      Share capital structure snapshot from F10. Endpoint not yet probed.

  - source_id: cninfo_top_shareholders_profile
    source_layer: company_profile
    source_category: shareholder_profile
    profile_section: shareholder
    shareholder_scope: top_shareholder
    recommended_status: candidate
    verified: false
    endpoint: null
    page_url: null
    expected_fields:
      - shareholder_name
      - holding_shares
      - holding_ratio
      - rank
      - report_period
    notes: >-
      Top-10 shareholders snapshot. Not shareholder_data metric (D-class).
      Endpoint not yet probed.

  - source_id: cninfo_top_float_shareholders_profile
    source_layer: company_profile
    source_category: shareholder_profile
    profile_section: shareholder
    shareholder_scope: top_float_shareholder
    recommended_status: candidate
    verified: false
    endpoint: null
    page_url: null
    expected_fields:
      - shareholder_name
      - holding_shares
      - holding_ratio
      - rank
      - report_period
    notes: >-
      Top-10 float shareholders snapshot. Endpoint not yet probed.

  - source_id: cninfo_dividend_financing_profile
    source_layer: company_profile
    source_category: dividend_financing_profile
    profile_section: dividend_financing
    recommended_status: candidate
    verified: false
    endpoint: null
    page_url: null
    expected_fields:
      - cumulative_dividend_candidate
      - financing_summary_candidate
      - last_dividend_date_candidate
    notes: >-
      Profile-level dividend / financing summary from F10. Not dividend event
      timeline (B/D). Endpoint not yet probed.

  - source_id: cninfo_company_contact_profile
    source_layer: company_profile
    source_category: contact_profile
    profile_section: contact
    recommended_status: candidate
    verified: false
    endpoint: null
    page_url: null
    expected_fields:
      - contact_phone
      - contact_fax
      - contact_email
      - company_website
      - board_secretary
      - registered_address
      - office_address
    notes: >-
      Contact and address fields. May overlap basic_profile. Endpoint not yet probed.

  - source_id: cninfo_company_security_profile
    source_layer: company_profile
    source_category: security_profile
    profile_section: security
    recommended_status: testing
    verified: false
    endpoint:
      url: "https://www.cninfo.com.cn/new/newInterface/marketOverview"
      method: "GET"
      params_template:
        secCode: "{company_code}"
        orgId: "{org_id}"
        secType: "szshe"
      records_path: "$"
      headers_required_candidate:
        - Referer
        - X-Requested-With
    page_url: null
    expected_fields:
      - company_code
      - stock_short_name
      - exchange
      - listed_board
      - listing_date
      - listing_status
      - is_st_candidate
    sample_observation:
      companies_tested:
        - company_code: "600000"
          company_name: "浦发银行"
          result: "endpoint_found"
        - company_code: "300001"
          company_name: "特锐德"
          result: "endpoint_found"
        - company_code: "688001"
          company_name: "华兴源创"
          result: "endpoint_found"
      sample_result_summary: "3/3 endpoint_found"
    sample_fields:
      - secCode
      - secName
      - secType
      - tradingStatus
      - age
      - finance
      - delisted
      - sshk
      - szhk
    annex_endpoints:
      - annex_id: "numeric_head_strip"
        url: "https://www.cninfo.com.cn/data20/companyOverview/getHeadStripData"
        method: "GET"
        params_template:
          scode: "{company_code}"
        records_path: "data.records[0]"
        observed_for:
          - "600000"
          - "300001"
          - "688001"
        sample_fields:
          - ENDDATE
          - F005N
          - F020N
          - F021N
          - F041N
          - F081N
          - F089N
          - F102N
          - F109N
          - F111N
          - F115N
        known_caveats:
          - "FxxxN field semantics are not confirmed."
          - "Keep raw-first; do not normalize into share_capital_profile yet."
    known_caveats:
      - "secType=szshe worked for the three P1 samples but needs broader board validation."
      - "sshk/szhk semantics are candidate-level."
      - "This endpoint is security overview, not full company profile."
    notes: >-
      P1 DevTools probe backfill v1. marketOverview primary endpoint;
      getHeadStripData recorded as annex_endpoints only (not independent source).
      verified=false.
