# CNINFO announcement category configuration (Sub Issue 2)
# Purpose: unify validation config for CNINFO announcement/document-derived categories.
# Scope: config only; no network calls; no validation run.

- category_key: semi_annual_report
  category_name_cn: 半年报
  priority: P1
  data_type: document
  keywords:
    - 半年度报告
    - 半年报
  expected_fields:
    - announcement_title
    - publish_time
    - report_period
    - pdf_url
    - source_url
  suggested_storage_layer: PostgreSQL document + raw_file; MinIO PDF evidence
  validation_goal: 验证半年报公告能否稳定获取标题/发布时间/报告期/PDF链接
  notes: P1 栏目；依赖公告列表查询；需配合 company identity mapping 的 stockCode/orgId

