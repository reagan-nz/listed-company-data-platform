# CNINFO B 类 Document Corpus — Announcement Category Routing Draft
# Era C Phase 3 — design_only; 不入库; 不写 verified.
# 权威设计: plans/cninfo_b_class_category_routing_rules.md
# 验证口径: plans/cninfo_b_class_validation_design.md
# B 类 registry: config/cninfo_b_class_source_registry_draft.yaml
#
# 说明:
# - 本文件为 B 类 document corpus 的 title/category 路由配置草案。
# - 未声称 CNINFO 官方 category 码已完整确认；category_code 均为 null 待 probe。
# - 取代 Sub Issue 2 的 14 类 event-candidate 列表格式；旧键见 legacy_category_key_map。
# - validate_cninfo_announcement_categories.py 需按本结构改造后方能运行（尚未改造）。

version: "draft-0.1"
status: design_only
verified: false

defaults:
  category_code: null
  cninfo_tab: fulltext
  validation_status: design_only

categories:
  periodic_report:
    category_name_cn: 定期报告全文
    category_code: null
    cninfo_category_code_candidates: []
    document_types:
      - annual_report
      - semi_annual_report
      - quarterly_report_q1
      - quarterly_report_q3
    positive_patterns:
      annual_report:
        - 年度报告
        - 年报
      semi_annual_report:
        - 半年度报告
        - 半年报
      quarterly_report_q1:
        - 第一季度报告
        - 一季度报告
        - 第一季度报告全文
        - 一季度报告全文
      quarterly_report_q3:
        - 第三季度报告
        - 三季度报告
        - 第三季度报告全文
        - 三季度报告全文
    exclusion_patterns:
      - 摘要
      - 问询函
      - 回复公告
      - 说明会
      - 业绩说明会
      - 投资者说明会
      - 提示性公告
      - 披露提示性公告
      - 预告公告
      - 延期披露
      - 关于延期披露
      - 关于披露
      - 解读
      - 交流会
      - 集体接待日
      - 投资者开放日
      - 监管问询函
      - 警示函
      - 监管工作函
      # unrelated_announcement（validation_design §7 其他无关公告）
      - 补充公告
      - 更正公告
      - 取消披露
      - 审计机构
      - 内部控制评价报告
      - 非标意见
      - 非标准审计意见  # B-FM-32：全称变体（「非标意见」非子串）
    route_to:
      source_id: cninfo_periodic_report_pdf
      source_layer: document_corpus
    validation_method: expected_period
    registry_status: testing_stable_sample
    notes: >-
      Inherits Phase 1 A-class retrieval (749/796 effective coverage). Requires
      period match + positive pattern + NOT exclusion. Official CNINFO category
      codes for quarterly reports (e.g. category_yjdbg_szsh) not locked in this draft.
      Period mismatch vs expected_period → false_positive_reason=wrong_period
      (validation_design §7); title may still route to cninfo_periodic_report_pdf.

  inquiry_reply:
    category_name_cn: 问询函及回复
    category_code: null
    cninfo_category_code_candidates: []
    document_types:
      - inquiry_reply
      - regulatory_inquiry
    positive_patterns:
      - 问询函
      - 回复公告
      - 监管问询函
      - 关注函
      - 警示函
      - 监管工作函
      - 回复函
      - 年报问询函
    exclusion_patterns: []
    route_to:
      source_id: cninfo_inquiry_reply_pdf
      source_layer: document_corpus
    validation_method: known_document
    registry_status: candidate
    notes: >-
      MUST NOT route to periodic_report. Phase 1 periodic exclusions are POSITIVE here.
      B-FM-07：警示函为 harvest 已见监管函件边角（收到…警示函 → regulatory_inquiry）。
      B-FM-11：监管工作函为 harvest 已见边角（CPA「监管工作函的专项说明」→ inquiry_reply；
      收到…监管工作函 → regulatory_inquiry）；须从 periodic 排除，避免含「年度报告」误进年报。
      Not yet independently validated.

  meeting_notice:
    category_name_cn: 说明会及会议通知
    category_code: null
    cninfo_category_code_candidates: []
    document_types:
      - meeting_notice
      - investor_relations_activity
    positive_patterns:
      - 说明会
      - 业绩说明会
      - 投资者说明会
      - 投资者关系活动记录表
      - 交流会
      - 集体接待日
      - 投资者开放日
      - 股东大会通知
      - 董事会会议通知
    exclusion_patterns: []
    route_to:
      source_id: cninfo_meeting_notice_pdf
      source_layer: document_corpus
    validation_method: known_document
    registry_status: candidate
    notes: >-
      IR / meeting corpus. Not a substitute for periodic reports. Not yet validated.
      B-FM-04：集体接待日 / 投资者开放日 为 harvest 已见 IR 边角（无说明会后缀时
      document_type=investor_relations_activity）。

  general_announcement:
    category_name_cn: 普通公告 PDF
    category_code: null
    cninfo_category_code_candidates: []
    document_types:
      - announcement
      - board_resolution
      - shareholder_meeting_material
      - other
    positive_patterns:
      - 公告
      - 决议
      - 股东大会
      - 股东会
      - 董事会
      - 监事会
      - 权益分派
      - 利润分配
      - 回购
      - 业绩预告
      - 法律意见书
      - 法律意见
      - 核查意见
      - 保荐书
      - 权益变动报告书
      - 受托管理事务报告
      - 跟踪评级报告
      - 持续督导
      - 非标准审计意见
      - 募集资金使用情况报告
      - 独立董事专门会议的审核意见  # B-FM-33：窄；勿裸「审核意见」
      - 独立董事提名人声明与承诺  # B-FM-33：治理披露边角
      - 资产评估说明  # B-FM-34：窄；勿裸「说明」
      - 审计报告  # B-FM-34：独立审计报告边角；含「年度报告」/「年报」仍优先 periodic
      - 买卖公司股票的自查报告  # B-FM-35：窄；勿裸「自查报告」
      - 员工持股计划  # B-FM-35：ESOP 草案/修订稿边角
      - 公司章程  # B-FM-36：窄；勿裸「章程」
      - 募集资金管理制度  # B-FM-36：窄；勿裸「管理制度」/「制度」
      - 独立非执行董事工作制度  # B-FM-37：窄；勿裸「工作制度」/「制度」
      - 总经理工作细则  # B-FM-37：窄；勿裸「工作细则」/「细则」
      - 货币资金管理制度  # B-FM-38：窄；勿裸「管理制度」/「制度」
      - 对外担保管理制度  # B-FM-38：窄；勿裸「管理制度」；与「对外担保的情况简报」可区分
      - 子公司管理制度  # B-FM-39：窄；覆盖「分、子公司管理制度」；勿裸「管理制度」/「制度」
      - 薪酬与考核方案  # B-FM-39：窄；勿裸「薪酬」/「考核方案」
      - 对外担保的情况简报  # B-FM-40：窄；≠对外担保管理制度；勿裸「简报」/「情况简报」
      - Corporate Governance Report  # B-FM-40：窄 ESG 英文检索键；勿裸「ESG」/「Report」；CNINFO 拒长逗号串
      - 激励对象名单  # B-FM-41：窄；勿裸「名单」；≠授予限制性股票公告
      - 销售简报  # B-FM-41：窄；勿裸「简报」；≠对外担保的情况简报
    exclusion_patterns: []
    route_to:
      source_id: cninfo_general_announcement_pdf
      source_layer: document_corpus
    validation_method: category_sample
    registry_status: candidate
    notes: >-
      Broad fallback corpus. Titles excluded from periodic_report may land here with
      re-classified document_type. Use category-sample validation, NOT random success rate.
      B-FM-18：股东大会决议公告 / 召开…股东大会的公告（无「通知」）document_type=
      shareholder_meeting_material；法律意见书与会议材料仍为 announcement。
      B-FM-20：「股东会」同义简称（临时/年度股东会决议、召开…股东会的通知/公告）同样
      document_type=shareholder_meeting_material；法律意见书与会议材料/资料仍为 announcement。
      B-FM-26：非会议类法律意见书（增持/差异化分红/可转债等）含「法律意见」一律
      document_type=announcement（勿落 other；勿抬成 shareholder_meeting_material）。
      B-FM-27：保荐机构等「核查意见」（募资置换/限售流通等）含「核查意见」一律
      document_type=announcement（勿落 other；不扩 schema）。
      B-FM-28：上市保荐书 / 简式权益变动报告书等标题常无「公告」等 general
      positive_patterns，旧逻辑落 other；含「保荐书」或「权益变动报告书」一律
      document_type=announcement（勿落 other；不扩 schema）。
      B-FM-29：债券受托管理事务报告 / 跟踪评级报告等标题常无「公告」等 general
      positive_patterns，旧逻辑落 other；含「受托管理事务报告」或「跟踪评级报告」一律
      document_type=announcement（勿落 other；不扩 schema）。
      B-FM-30：持续督导年度报告书 / 持续督导培训情况的报告——前者含子串「年度报告」会
      误进 periodic；后者无 general positive_patterns 落 other；含「持续督导」一律
      announcement（勿进 annual_report；勿落 other；不扩 schema）。
      B-FM-32：CPA「非标准审计意见…消除情况的专项说明」（「非标准审计意见」不含
      「非标意见」子串）及「前次募集资金使用情况报告」旧逻辑落 other；含
      「非标准审计意见」或「募集资金使用情况报告」一律 announcement（窄 pattern；
      不泛化「专项说明」；不扩 schema）。
      B-FM-33：「独立董事专门会议的审核意见」/「独立董事提名人声明与承诺」旧逻辑落
      other；窄 pattern 一律 announcement（勿裸「审核意见」波及年报审核意见
      periodic 路径；不扩 schema）。
      B-FM-34：「资产评估说明」/独立「审计报告」（无「年度报告」/「年报」子串）旧逻辑落
      other；窄 pattern 一律 announcement（勿裸「说明」；含年报字样的审计报告仍走
      periodic Priority 3；不扩 schema）。
      B-FM-35：「买卖公司股票的自查报告」/「员工持股计划」旧逻辑落 other；窄
      pattern 一律 announcement（勿裸「自查报告」；不硬推章程/制度/薪酬/名单/简报；
      不扩 schema）。
      B-FM-36：「公司章程」/「募集资金管理制度」旧逻辑落 other；窄 pattern 一律
      announcement（勿裸「章程」/「管理制度」/「制度」；货币资金/对外担保/分子公司
      等一般管理制度、薪酬/名单/简报/ESG 仍可 other；不扩 schema）。
      B-FM-37：「独立非执行董事工作制度」/「总经理工作细则」旧逻辑落 other；窄
      pattern 一律 announcement（勿裸「工作制度」/「工作细则」/「细则」；货币资金/
      对外担保/分子公司等一般管理制度、薪酬/名单/简报/ESG 仍可 other；不扩 schema）。
      B-FM-38：「货币资金管理制度」/「对外担保管理制度」旧逻辑落 other；窄 pattern
      一律 announcement（勿裸「管理制度」/「制度」；分子公司管理制度、薪酬/名单/
      简报/ESG 仍可 other；与「对外担保的情况简报」可区分；不扩 schema）。
      B-FM-39：「子公司管理制度」/「薪酬与考核方案」旧逻辑落 other；窄 pattern 一律
      announcement（勿裸「管理制度」/「薪酬」；名单/简报/ESG/对外担保情况简报仍可
      other；不扩 schema）。
      B-FM-40：「对外担保的情况简报」/英文 ESG（Corporate Governance Report）旧逻辑落
      other；窄 pattern 一律 announcement（勿裸「简报」/「情况简报」/「ESG」/
      「Report」；激励名单/销售简报仍可 other；≠对外担保管理制度；不扩 schema）。
      B-FM-41：「激励对象名单」/「销售简报」旧逻辑落 other；窄 pattern 一律
      announcement（勿裸「名单」/「简报」；≠对外担保的情况简报；闭合 remaining other；
      不扩 schema）。

# 延期披露 / 摘要 / 提示性预告等：从 periodic 排除后的候选路由（非独立 source，归入 general 或 future disclosure_related）
excluded_from_periodic_routing:
  delayed_disclosure:
    positive_patterns:
      - 延期披露
      - 关于延期披露
    suggested_document_types:
      - announcement
    route_to:
      source_id: cninfo_general_announcement_pdf
    notes: Phase 1 periodic exclusion; retain in corpus as disclosure-related announcement.

  report_summary:
    positive_patterns:
      - 摘要
      - 解读
    suggested_document_types:
      - announcement
      - other
    route_to:
      source_id: cninfo_general_announcement_pdf
    notes: Not periodic report full text; do not use for RAG report corpus primary source.

  # Phase 1 quality audit 主假阳性类（创业板 Q1/Q3 披露提示性公告）；须保留 false_positive_reason=announcement_preview
  announcement_preview:
    positive_patterns:
      - 披露提示性公告
      - 提示性公告
      - 预告公告
    suggested_document_types:
      - announcement
    route_to:
      source_id: cninfo_general_announcement_pdf
    notes: >-
      Phase 1 primary periodic false-positive class. Retain in disclosure/event
      corpus as preview/tip notice; never count as periodic full text.

  # Phase 1 quality audit wrong_company（交叉披露他司报告）；与 announcement_preview 相邻但语义不同
  # 例：关于披露冀东水泥半年报的提示性公告 / 关于披露他司报告的提示性公告
  # 非例：关于披露第一季度报告的提示性公告（本公司报告期提示 → announcement_preview）
  wrong_company:
    positive_patterns:
      - 他司
      - 关于披露他司
      - 其他公司
    suggested_document_types:
      - announcement
    route_to:
      source_id: cninfo_general_announcement_pdf
    notes: >-
      Cross-company disclosure tip (Phase 1 P1-AUD-022 class). Must not count as
      target issuer periodic full text. Entity-name forms (关于披露冀东水泥半年报…)
      are detected by validator heuristic; explicit 他司 patterns listed here.

  # validation_design §7 最后一类：含报告字样但非定期全文的其他无关公告
  # 例：补充/更正/取消披露、审计机构变更、内部控制评价报告、非标意见专项说明
  # 非例：某某公司2024年年度报告（正式全文）；披露提示性公告 → announcement_preview
  unrelated_announcement:
    positive_patterns:
      - 补充公告
      - 更正公告
      - 取消披露
      - 审计机构
      - 内部控制评价报告
      - 非标意见
      - 非标准审计意见  # B-FM-32：全称变体
    suggested_document_types:
      - announcement
    route_to:
      source_id: cninfo_general_announcement_pdf
    notes: >-
      Catch-all for titles that mention periodic-report keywords but are not the
      full report text and are not covered by delayed/summary/preview/wrong_company.
      Must emit false_positive_reason=unrelated_announcement.

# Sub Issue 2 旧 category_key → 新 routing 映射（供脚本迁移参考，非运行时路由）
legacy_category_key_map:
  semi_annual_report: periodic_report
  quarterly_report: periodic_report
  performance_forecast: general_announcement
  dividend_distribution: general_announcement
  shareholder_meeting: general_announcement
  board_meeting: general_announcement
  supervisory_board: general_announcement
  regulatory_inquiry: inquiry_reply
  penalty_litigation: general_announcement
  share_repurchase: general_announcement
  private_placement: general_announcement
  major_asset_restructuring: general_announcement
  equity_incentive: general_announcement
  share_unlock: general_announcement
