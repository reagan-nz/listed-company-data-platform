# CNINFO B 类 Document Corpus — Announcement Category Routing Draft
# Era C Phase 3 — design_only; 不入库; 不写 verified.
# 权威设计: plans/cninfo_b_class_category_routing_rules.md
# 验证口径: plans/cninfo_b_class_validation_design.md
# B 类 registry: config/cninfo_b_class_source_registry_draft.yaml
#
# 说明:
# - 本文件为 B 类 document corpus 的 title/category 路由配置草案。
# - 未声称 CNINFO 官方 category 码已完整确认；category_code 均为 null 待 probe。
# - 取代 Sub Issue 2 的 14 类 event-candidate 列表格式；旧键见 legacy_category_key_map。
# - validate_cninfo_announcement_categories.py 需按本结构改造后方能运行（尚未改造）。

version: "draft-0.1"
status: design_only
verified: false

defaults:
  category_code: null
  cninfo_tab: fulltext
  validation_status: design_only

categories:
  periodic_report:
    category_name_cn: 定期报告全文
    category_code: null
    cninfo_category_code_candidates: []
    document_types:
      - annual_report
      - semi_annual_report
      - quarterly_report_q1
      - quarterly_report_q3
    positive_patterns:
      annual_report:
        - 年度报告
        - 年报
      semi_annual_report:
        - 半年度报告
        - 半年报
      quarterly_report_q1:
        - 第一季度报告
        - 一季度报告
        - 第一季度报告全文
        - 一季度报告全文
      quarterly_report_q3:
        - 第三季度报告
        - 三季度报告
        - 第三季度报告全文
        - 三季度报告全文
    exclusion_patterns:
      - 摘要
      - 问询函
      - 回复公告
      - 说明会
      - 业绩说明会
      - 投资者说明会
      - 提示性公告
      - 披露提示性公告
      - 预告公告
      - 延期披露
      - 关于延期披露
      - 关于披露
      - 解读
      - 交流会
      - 监管问询函
    route_to:
      source_id: cninfo_periodic_report_pdf
      source_layer: document_corpus
    validation_method: expected_period
    registry_status: testing_stable_sample
    notes: >-
      Inherits Phase 1 A-class retrieval (749/796 effective coverage). Requires
      period match + positive pattern + NOT exclusion. Official CNINFO category
      codes for quarterly reports (e.g. category_yjdbg_szsh) not locked in this draft.

  inquiry_reply:
    category_name_cn: 问询函及回复
    category_code: null
    cninfo_category_code_candidates: []
    document_types:
      - inquiry_reply
      - regulatory_inquiry
    positive_patterns:
      - 问询函
      - 回复公告
      - 监管问询函
      - 关注函
      - 回复函
      - 年报问询函
    exclusion_patterns: []
    route_to:
      source_id: cninfo_inquiry_reply_pdf
      source_layer: document_corpus
    validation_method: known_document
    registry_status: candidate
    notes: >-
      MUST NOT route to periodic_report. Phase 1 periodic exclusions are POSITIVE here.
      Not yet independently validated.

  meeting_notice:
    category_name_cn: 说明会及会议通知
    category_code: null
    cninfo_category_code_candidates: []
    document_types:
      - meeting_notice
      - investor_relations_activity
    positive_patterns:
      - 说明会
      - 业绩说明会
      - 投资者说明会
      - 投资者关系活动记录表
      - 交流会
      - 股东大会通知
      - 董事会会议通知
    exclusion_patterns: []
    route_to:
      source_id: cninfo_meeting_notice_pdf
      source_layer: document_corpus
    validation_method: known_document
    registry_status: candidate
    notes: >-
      IR / meeting corpus. Not a substitute for periodic reports. Not yet validated.

  general_announcement:
    category_name_cn: 普通公告 PDF
    category_code: null
    cninfo_category_code_candidates: []
    document_types:
      - announcement
      - board_resolution
      - shareholder_meeting_material
      - other
    positive_patterns:
      - 公告
      - 决议
      - 股东大会
      - 董事会
      - 监事会
      - 权益分派
      - 利润分配
      - 回购
      - 业绩预告
    exclusion_patterns: []
    route_to:
      source_id: cninfo_general_announcement_pdf
      source_layer: document_corpus
    validation_method: category_sample
    registry_status: candidate
    notes: >-
      Broad fallback corpus. Titles excluded from periodic_report may land here with
      re-classified document_type. Use category-sample validation, NOT random success rate.

# 延期披露 / 摘要 / 提示性预告等：从 periodic 排除后的候选路由（非独立 source，归入 general 或 future disclosure_related）
excluded_from_periodic_routing:
  delayed_disclosure:
    positive_patterns:
      - 延期披露
      - 关于延期披露
    suggested_document_types:
      - announcement
    route_to:
      source_id: cninfo_general_announcement_pdf
    notes: Phase 1 periodic exclusion; retain in corpus as disclosure-related announcement.

  report_summary:
    positive_patterns:
      - 摘要
      - 解读
    suggested_document_types:
      - announcement
      - other
    route_to:
      source_id: cninfo_general_announcement_pdf
    notes: Not periodic report full text; do not use for RAG report corpus primary source.

  # Phase 1 quality audit 主假阳性类（创业板 Q1/Q3 披露提示性公告）；须保留 false_positive_reason=announcement_preview
  announcement_preview:
    positive_patterns:
      - 披露提示性公告
      - 提示性公告
      - 预告公告
    suggested_document_types:
      - announcement
    route_to:
      source_id: cninfo_general_announcement_pdf
    notes: >-
      Phase 1 primary periodic false-positive class. Retain in disclosure/event
      corpus as preview/tip notice; never count as periodic full text.

  # Phase 1 quality audit wrong_company（交叉披露他司报告）；与 announcement_preview 相邻但语义不同
  # 例：关于披露冀东水泥半年报的提示性公告 / 关于披露他司报告的提示性公告
  # 非例：关于披露第一季度报告的提示性公告（本公司报告期提示 → announcement_preview）
  wrong_company:
    positive_patterns:
      - 他司
      - 关于披露他司
      - 其他公司
    suggested_document_types:
      - announcement
    route_to:
      source_id: cninfo_general_announcement_pdf
    notes: >-
      Cross-company disclosure tip (Phase 1 P1-AUD-022 class). Must not count as
      target issuer periodic full text. Entity-name forms (关于披露冀东水泥半年报…)
      are detected by validator heuristic; explicit 他司 patterns listed here.

# Sub Issue 2 旧 category_key → 新 routing 映射（供脚本迁移参考，非运行时路由）
legacy_category_key_map:
  semi_annual_report: periodic_report
  quarterly_report: periodic_report
  performance_forecast: general_announcement
  dividend_distribution: general_announcement
  shareholder_meeting: general_announcement
  board_meeting: general_announcement
  supervisory_board: general_announcement
  regulatory_inquiry: inquiry_reply
  penalty_litigation: general_announcement
  share_repurchase: general_announcement
  private_placement: general_announcement
  major_asset_restructuring: general_announcement
  equity_incentive: general_announcement
  share_unlock: general_announcement
