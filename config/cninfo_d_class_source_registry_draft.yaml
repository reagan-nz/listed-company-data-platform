        role: primary
        params: {}
      - mode_id: market_summary
        description: 附属观察 — marginTrading/market?tdate= 市场汇总，不作主 source
        role: auxiliary_observation_only
        url: https://www.cninfo.com.cn/data20/marginTrading/market
        params:
          tdate: "<YYYY-MM-DD>"
        notes: Stability retest HTTP 500; different units (亿元) vs detailList
