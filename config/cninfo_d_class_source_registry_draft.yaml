# CNINFO D 类 Source Registry YAML Draft
# 设计草案 — 非生产配置；不入库；不写 verified。
# 权威设计：plans/cninfo_d_class_source_registry_design.md
# 映射审查：plans/cninfo_d_class_source_to_schema_mapping_review.md
# 说明文档：plans/cninfo_d_class_source_registry_draft_notes.md

version: "draft-0.1"
status: design_only
generated_from:
  - outputs/validation/cninfo_table_sources_phase2_current_final_summary.md
  - plans/cninfo_d_class_source_to_schema_mapping_review.md
  - config/cninfo_table_sources.yaml
  - outputs/validation/cninfo_table_field_semantics_ui_check_summary.md
  - outputs/validation/cninfo_table_field_semantics_priority2.md

defaults:
  method: POST
  timeout_seconds: 10
  sleep_seconds: 0.6
  headers_profile: cninfo_ajax

sources:
  - source_id: disclosure_schedule
    source_name: 预约披露 / 定期报告预约披露
    source_layer: disclosure_schedule
    source_category: report_schedule
    target_logical_table: d_disclosure_schedule
    company_code_available: true
    api:
      url: https://www.cninfo.com.cn/new/information/getPrbookInfo
      method: POST
      params_location: form
      default_params:
        sectionTime: "2025-12-31"
        firstTime: ""
        lastTime: ""
        market: szsh
        stockCode: ""
        orderClos: ""
        isDesc: ""
        pagesize: 20
        pagenum: 1
      page_url: https://www.cninfo.com.cn/new/commonUrl?url=disclosure/list/notice
      records_path: prbookinfos
    supported_modes:
      - mode_id: section_time_paged
        description: 按报告期 sectionTime 分页查询
        params:
          sectionTime: "<YYYY-MM-DD>"
          market: szsh
          pagesize: 20
          pagenum: 1
    status:
      recommended_status: testing_stable_sample
      verified: false
      blocked: false
      schema_changed: false
    fields:
      confirmed:
        - raw: seccode
          standard: company_code
        - raw: secname
          standard: company_name
        - raw: orgId
          standard: org_id
        - raw: f001d_0102
          standard: report_period
        - raw: f002d_0102
          standard: first_scheduled_disclosure_date
        - raw: f003d_0102
          standard: first_changed_disclosure_date
        - raw: f004d_0102
          standard: second_changed_disclosure_date
        - raw: f005d_0102
          standard: third_changed_disclosure_date
        - raw: f006d_0102
          standard: actual_disclosure_date
      candidate: []
      raw_only:
        - raw: latest_time
          standard: latest_update_time
          reason: not_visible_on_ui; samples often null
      not_visible_on_ui:
        - latest_time
      uncertain: []
    mapping:
      event_type: null
      event_subtype_mode: null
      standard_fields:
        company_code: seccode
        company_name: secname
        org_id: orgId
        report_period: f001d_0102
        first_scheduled_date: f002d_0102
        first_changed_date: f003d_0102
        second_changed_date: f004d_0102
        third_changed_date: f005d_0102
        actual_disclosure_date: f006d_0102
      raw_record_required: true
      mapping_confidence: high
    validation:
      sample_rows: 20
      observed_total_rows: 5493
      stability_cases: 2
      empty_but_valid_cases: 0
      artifacts:
        - outputs/validation/cninfo_table_sources_multidate_stability.csv
        - outputs/validation/cninfo_table_field_semantics_ui_check_summary.md
    notes: >-
      Schedule/disclosure source; records_path=prbookinfos (not data.records).
      org_id bridges to Phase 1 A-class report PDF timeline. latest_time not standardized.

