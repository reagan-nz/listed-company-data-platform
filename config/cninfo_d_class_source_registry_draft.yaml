      recommended_status: testing_stable_sample
      verified: false
      blocked: false
      schema_changed: false
    fields:
      confirmed:
        - raw: TRADEDATE
          standard: trade_date
        - raw: SECCODE
          standard: company_code
        - raw: SECNAME
          standard: company_name
        - raw: F001N
          standard: financing_balance_yuan
        - raw: F002N
          standard: financing_buy_amount_yuan
        - raw: F004N
          standard: securities_lending_balance_shares
        - raw: F006N
          standard: securities_lending_sell_volume_shares
        - raw: F009N
          standard: margin_trading_balance_yuan
      candidate: []
      raw_only:
        - raw: F003N
          reason: not_visible_on_ui; samples often null
        - raw: F007N
          reason: not_visible_on_ui; samples often null
        - raw: F010V
          reason: not_visible_on_ui; market name internal
        - raw: F011V
          reason: not_visible_on_ui; board code internal
        - raw: F012V
          reason: not_visible_on_ui; stock type internal
        - raw: MEMO
          reason: pending UI confirmation; samples often empty
      not_visible_on_ui:
        - F003N
        - F007N
        - F010V
        - F011V
        - F012V
        - MEMO
      uncertain:
        - raw: F008N
          standard: securities_lending_balance_amount_candidate
          reason: F001N+F008N≈F009N arithmetic check pending
    mapping:
      event_type: null
      event_subtype_mode: null
      metric_names:
        - financing_balance_yuan
        - financing_buy_amount_yuan
        - securities_lending_balance_shares
        - securities_lending_sell_volume_shares
        - margin_trading_balance_yuan
      standard_fields:
        trade_date: TRADEDATE
        company_code: SECCODE
        company_name: SECNAME
      raw_record_required: true
      mapping_confidence: medium
    validation:
      sample_rows: 4374
      stability_cases: 2
      empty_but_valid_cases: 0
      artifacts:
        - outputs/validation/cninfo_table_sources_multidate_stability.csv
        - outputs/validation/cninfo_table_field_semantics_ui_check_summary.md
    notes: >-
      Metric-only source (not company_event). detailList is primary; no explicit date param.
      market summary is auxiliary observation only — do not use as main source.

