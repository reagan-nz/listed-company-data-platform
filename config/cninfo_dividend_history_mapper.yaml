parse_rules_v1:
  dividend_year:
    from: F001V
    pattern: "(\\d{4})"
    note: 提取首个四位年份
  cash_dividend_per_share:
    from: F007V
    patterns:
      - "10派(\\d+(?:\\.\\d+)?)元"
    transform: "match_group_1 / 10"
  stock_dividend_ratio:
    from: F007V
    patterns:
      - "10送(\\d+(?:\\.\\d+)?)股"
    transform: "match_group_1 / 10"
  transfer_ratio:
    from: F007V
    patterns:
      - "10转增(\\d+(?:\\.\\d+)?)股"
      - "10转(\\d+(?:\\.\\d+)?)股"
    transform: "match_group_1 / 10"
  dividend_method:
    from: F007V
    rules:
      - if_contains: ["派", "元"]
        value: cash
      - if_contains: ["送"]
        value: stock
      - if_contains: ["转增", "转"]
        value: transfer
      - if_multiple: true
        value: mixed
      - default: other

quality_rules:
  valid_empty:
    condition: HTTP 200 and data.records is empty list
    harvest_status: success_with_valid_empty
    case_result: not_fail
  missing:
    condition: endpoint_found but normalized_core field null
    harvest_status: partial_field_missing
  source_partial:
    condition: field present in schema but company coverage below gate
    note: 日期字段老记录 null 率高；F007V 复杂方案解析失败
