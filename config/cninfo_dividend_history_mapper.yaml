# CNINFO C-Class dividend_history 字段映射配置
# Era C Phase 4 — mapping spec only（不执行 harvest · 不写 verified）
#
# registry source_id: cninfo_dividend_financing_profile
# logical_source_id:  dividend_history
# endpoint: GET .../getCompanyHisDividend?scode={company_code}
# records_path: data.records（一条分红事件一行）

version: dividend-history-mapper-v1
generated_at: "2026-07-07"
status: design_only
verified: false

logical_source_id: dividend_history
registry_source_id: cninfo_dividend_financing_profile
endpoint_path: /data20/companyOverview/getCompanyHisDividend
record_level: dividend_event

design_principles:
  - dividend_history 不等于 financing；禁止用 financing 作为逻辑名
  - 分红事件为公司历史事件，非融资行为
  - 保留 report_period；同一公司多期分红（2022/2023/2024…）
  - 保留 raw_record_json + raw_record_hash 作为 evidence
  - valid_empty：公司无分红记录不算失败

status_counts:
  normalized_core: 9
  review_later: 8
  raw_only: 4

