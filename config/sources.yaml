# Source configuration for the data source validation framework.
#
# This file is the ONLY place where source-specific behavior is declared.
# Collectors read these entries; no source URL or risk policy is hard-coded in code.
#
# `defaults` are merged into every source entry; a source may override any key.
#
# Field reference (per source):
#   name                       Human-readable source name (required)
#   category                   Maps 1:1 to a collector module (required)
#   base_url                   Landing / entry URL used for existence + fetch checks
#   recommended_method         Suggested real collection strategy (free text)
#   risk_level                 low | medium | high
#   priority                   P0 | P1 | P2  (P2 = not recommended for first-stage use)
#   fetch_mode                 fetch | existence  (existence = HEAD / light GET only)
#   query_template             URL template containing {query}; empty = no search
#   needs_playwright           true if JS rendering is likely required
#   needs_llm                  true if LLM adds value (summary/classification/extraction)
#   can_store_full_text        true only if terms clearly allow storing full text
#   suggested_storage          What is safe to persist (free text)
#   legal_risk_note            Short legal/compliance note
#   needs_legal_review         true if terms are unclear / require legal sign-off
#   authorization_required     true if API/authorization/login is likely required

defaults:
  base_url: ""
  recommended_method: ""
  risk_level: "low"
  priority: "P1"
  fetch_mode: "fetch"
  query_template: ""
  needs_playwright: false
  needs_llm: false
  can_store_full_text: false
  suggested_storage: "metadata + source_url only"
  legal_risk_note: "Public page; respect robots.txt and terms of use."
  needs_legal_review: false
  authorization_required: false

