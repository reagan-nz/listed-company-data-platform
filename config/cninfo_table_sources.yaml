  - source_id: shareholder_change
    source_name: 股东增减持
    category: fixed_table
    priority: 2
    page_url: "https://www.cninfo.com.cn/new/commonUrl?url=data/person-stock-data-tables"
    api_url: "https://www.cninfo.com.cn/data20/shareholeder/detail"
    method: POST
    params_location: query
    params_template:
      type: "inc"
      tdate: "2026-07-03"
    expected_response_type: json
    expected_fields:
      - DECLAREDATE
      - SECCODE
      - SECNAME
      - VARYDATE
      - F002V
      - F004N
      - F005N
      - F007V
    key_dimensions:
      - announcement_date
      - company_code
      - company_name
      - change_date
      - shareholder_name
      - share_change_amount_candidate
      - share_change_ratio_candidate
      - change_price_candidate
    sample_strategy: "dual mode: type=inc (default params_template with tdate) or type=desc; single request each; no pagination"
    notes: >-
      Public JSON endpoint discovered via DevTools.
      Endpoint path is /shareholeder/detail; spelling is shareholeder in observed request.
      Referrer page is url=data/person-stock-data-tables, tab 股东增减持.
      shareholder_change supports two modes:
      type=inc: share increase detail (observed with tdate=2026-07-03, total=3).
      type=desc: share decrease detail (observed HTTP 200, total=16, count=16; tdate may be null).
      inc and desc share the same raw field structure (8 fields).
      Do not use type=dec; observed parameter is type=desc.
      Request uses POST with query parameters and empty body.
      data.records returns company-level shareholder change records.
      Field semantics confirmed via UI for both inc and desc modes.
      Do not treat field semantics as fully verified. Do not write verified.
    recommended_status: testing

