# CNINFO D 类固定表格 / 市场行为数据源配置（Era C Phase 2）
# 权威分层：plans/cninfo_data_source_layered_inventory.md §7
# 验证脚本：lab/validate_cninfo_table_sources.py
#
# api_url 仅填写经 DevTools / 文档确认后的公开接口；未知则 null，不猜测。
# recommended_status 初始值：unknown / candidate；不写 verified。

version: 1
layer: D
category: fixed_table

defaults:
  method: POST
  timeout_seconds: 10
  sleep_seconds: 0.6
  sample_page_size: 10
  headers_profile: cninfo_ajax

sources:
  - source_id: disclosure_schedule
    source_name: 预约披露 / 定期报告预约披露
    category: fixed_table
    priority: 1
    page_url: "https://www.cninfo.com.cn/new/commonUrl?url=disclosure/list/notice"
    api_url: "https://www.cninfo.com.cn/new/information/getPrbookInfo"
    method: POST
    params_template:
      sectionTime: "2025-12-31"
      firstTime: ""
      lastTime: ""
      market: "szsh"
      stockCode: ""
      orderClos: ""
      isDesc: ""
      pagesize: 20
      pagenum: 1
    expected_response_type: json
    expected_fields:
      - seccode
      - secname
      - orgId
      - f001d_0102
      - f002d_0102
      - f003d_0102
      - f004d_0102
      - f005d_0102
      - f006d_0102
      - latest_time
    key_dimensions:
      - company_code
      - company_name
      - org_id
      - report_period
      - scheduled_disclosure_date
      - revised_disclosure_date
    sample_strategy: "page 1 only, pagesize 20"
    notes: >-
      Public JSON endpoint discovered via DevTools.
      Request uses application/x-www-form-urlencoded form data.
      f001d_0102 appears to be report period / section date.
      f002d_0102 and f006d_0102 appear to be scheduled/current disclosure dates.
      f003d_0102/f004d_0102/f005d_0102 appear to be change-date related fields;
      exact semantics need confirmation.
      totalRows in observed response was 5493.
      Do not treat field semantics as fully verified.
    recommended_status: testing

