      - stock_type
    sample_strategy: "detailList default request only, no pagination, no date loop"
    notes: >-
      Public JSON endpoint discovered via DevTools.
      detailList returns company-level margin trading records.
      Observed total was 4374 records.
      Request currently uses POST with empty body and no query params.
      Field semantics F001N/F002N/F003N/F004N/F006N/F007N/F008N/F009N need confirmation.
      F010V/F011V/F012V appear to be market / board / stock type fields.
      market endpoint also exists at
      https://www.cninfo.com.cn/data20/marginTrading/market?tdate=2026-07-02,
      but it is market-level summary and is not used as the main company-level source in this task.
      Do not treat field semantics as fully verified.
    recommended_status: testing

