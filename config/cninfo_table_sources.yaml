    source_name: 融资融券
    category: fixed_table
    priority: 1
    page_url: "https://www.cninfo.com.cn/new/commonUrl?url=data/rzrq-zjlx"
    api_url: "https://www.cninfo.com.cn/data20/marginTrading/detailList"
    method: POST
    params_location: none
    params_template: {}
    expected_response_type: json
    expected_fields:
      - TRADEDATE
      - SECCODE
      - SECNAME
      - F001N
      - F002N
      - F003N
      - F004N
      - F006N
      - F007N
      - F008N
      - F009N
      - F010V
      - F011V
      - F012V
      - MEMO
    key_dimensions:
      - trade_date
      - company_code
      - company_name
      - financing_balance
      - financing_buy_amount
      - securities_lending_balance
      - securities_lending_volume
      - margin_trading_balance
